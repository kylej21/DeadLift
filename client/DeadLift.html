<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeadLift — AI-powered DLQ repair</title>
  <link rel="stylesheet" href="styles.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="api.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Component scripts redeploy trigger -->
  <script type="text/babel" src="components/chrome.jsx"></script>
  <script type="text/babel" src="components/landing.jsx"></script>
  <script type="text/babel" src="components/auth.jsx"></script>
  <script type="text/babel" src="components/onboarding.jsx"></script>
  <script type="text/babel" src="components/dashboard.jsx"></script>
  <script type="text/babel" src="components/dashboard-panels.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    // ============================================================
    // Tweaks defaults + state
    // ============================================================
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"dashboardState":"populated"}/*EDITMODE-END*/;

    // ============================================================
    // Router
    // ============================================================
    const parseHash = (hash) => {
      const raw = hash || '#/';
      const qIdx = raw.indexOf('?');
      const path = qIdx === -1 ? raw : raw.slice(0, qIdx);
      const params = {};
      if (qIdx !== -1) {
        raw.slice(qIdx + 1).split('&').forEach(kv => {
          const eq = kv.indexOf('=');
          if (eq !== -1) params[decodeURIComponent(kv.slice(0, eq))] = decodeURIComponent(kv.slice(eq + 1));
        });
      }
      return { path, params };
    };

    const useRoute = () => {
      const [route, setRoute] = React.useState(location.hash || '#/');
      React.useEffect(() => {
        const handler = () => setRoute(location.hash || '#/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      return route;
    };

    const App = () => {
      const route = useRoute();
      const tweaks = useTweaks(TWEAK_DEFAULTS);
      window.__tweakState = tweaks;

      const { path, params } = parseHash(route);

      // Store org_id in session when returning from OAuth
      if (params.org_id) {
        window.session.setOrgId(params.org_id);
      }

      let page;
      if (path === '#/signin') page = <SignIn />;
      else if (path === '#/signup') page = <SignUp />;
      else if (path === '#/onboarding') page = <Onboarding error={params.error} />;
      else if (path.startsWith('#/app')) page = <Dashboard />;
      else page = <Landing />;

      return (
        <>
          {page}
          <TweaksPanel>
            <TweakSection label="Dashboard state">
              <TweakRadio
                label="View state"
                options={['populated', 'loading', 'empty']}
                value={tweaks.dashboardState}
                onChange={v => tweaks.set('dashboardState', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
